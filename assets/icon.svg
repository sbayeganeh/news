<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  <!-- Back page (left fold) -->
  <rect x="72" y="120" width="40" height="300" rx="10" fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linejoin="round"/>
  <path d="M92 420 C92 420 92 140 92 140" fill="none" stroke="#1a1a1a" stroke-width="0"/>
  <!-- Main newspaper body -->
  <rect x="100" y="80" width="320" height="340" rx="24" fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linejoin="round"/>
  <!-- Fold connection -->
  <path d="M100 380 L72 380" stroke="#1a1a1a" stroke-width="32" stroke-linecap="round"/>
  <path d="M100 160 L72 160" stroke="#1a1a1a" stroke-width="0"/>
  <!-- Image placeholder (top-left block) -->
  <rect x="156" y="148" width="90" height="80" rx="4" fill="#1a1a1a"/>
  <!-- Text lines (top-right) -->
  <line x1="276" y1="165" x2="370" y2="165" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
  <line x1="276" y1="200" x2="370" y2="200" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
  <!-- Bottom text lines (full width) -->
  <line x1="156" y1="272" x2="370" y2="272" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
  <line x1="156" y1="314" x2="370" y2="314" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
  <line x1="156" y1="356" x2="310" y2="356" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
</svg>
